<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Pilih Lokasi</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body { margin:0; font-family: sans-serif; }
    #map { height: 90vh; }
    #search {
      width: 95%;
      margin: 10px;
      padding: 10px;
    }
    button {
      width: 100%;
      padding: 15px;
      background: green;
      color: white;
      border: none;
      font-size: 16px;
    }
  </style>
</head>
<body>

<input id="search" placeholder="Cari lokasi (contoh: Indomaret, RS, dll)" />
<div id="map"></div>
<button onclick="kirimLokasi()">Kirim Lokasi</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  let selectedLat = null;
  let selectedLng = null;
  let marker;

  const map = L.map('map').setView([-3.7, 128.1], 13); // Ambon default

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Klik map
  map.on('click', function(e) {
    selectedLat = e.latlng.lat;
    selectedLng = e.latlng.lng;

    if (marker) map.removeLayer(marker);
    marker = L.marker(e.latlng).addTo(map);
  });

  // SEARCH pakai Nominatim
  document.getElementById("search").addEventListener("change", function() {
    const query = this.value;

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
      .then(res => res.json())
      .then(data => {
        if (data.length > 0) {
          const place = data[0];
          const lat = parseFloat(place.lat);
          const lon = parseFloat(place.lon);

          map.setView([lat, lon], 15);

          if (marker) map.removeLayer(marker);
          marker = L.marker([lat, lon]).addTo(map);

          selectedLat = lat;
          selectedLng = lon;
        }
      });
  });

  function kirimLokasi() {
    if (!selectedLat) {
      alert("Pilih lokasi dulu!");
      return;
    }

    Telegram.WebApp.sendData(JSON.stringify({
      lat: selectedLat,
      lng: selectedLng
    }));

    Telegram.WebApp.close();
  }

  Telegram.WebApp.expand();
</script>

</body>
</html>
